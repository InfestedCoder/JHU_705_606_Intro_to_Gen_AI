# Module 10 environment: use AFTER creating the base env and cloning it.
#
# Setup (one-time):
#   mamba env create -f conda-env.yml
#   mamba create -n jhu-genai-mod10 --clone jhu-intro-to-genai
#
# Then update the module 10 env with any extra deps (this file):
#   mamba env update -f conda-env-mod10.yml -n jhu-genai-mod10
#
# Activate: mamba activate jhu-genai-mod10
#
# ep_seq (NMTDataset, GO_token, EOS_token, PAD_token):
#   Not on PyPI/Conda. Get it from course materials (Canvas/files from instructor)
#   then either:
#     pip install /path/to/ep_seq   # if it's a package
#   or place the ep_seq folder in this directory and add to Python path in the notebook:
#     import sys; sys.path.insert(0, 'modules/module 10')
#
name: jhu-genai-mod10
channels:
  - pytorch
  - conda-forge
dependencies:
  - pip
  - conda-forge::pysoundfile
  - conda-forge::pytorch
  - conda-forge::torchvision
  - conda-forge::torchaudio
  - conda-forge::torchcodec

